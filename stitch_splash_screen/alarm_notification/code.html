<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gentle Reminder - Medication Alert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#006858",
                        "on-primary-fixed-variant": "#00315e",
                        "on-secondary-container": "#005d4f",
                        "on-surface": "#2c3434",
                        "inverse-surface": "#0b0f0f",
                        "primary-fixed": "#6aa8f9",
                        "surface-container-high": "#e2eae9",
                        "on-primary": "#f8f8ff",
                        "tertiary-fixed-dim": "#efcd96",
                        "surface-container": "#e9efee",
                        "primary-fixed-dim": "#5c9beb",
                        "tertiary-fixed": "#fedba3",
                        "on-error-container": "#6e0a12",
                        "outline-variant": "#abb4b3",
                        "tertiary-container": "#fedba3",
                        "tertiary": "#745b2f",
                        "primary-container": "#6aa8f9",
                        "primary-dim": "#005499",
                        "tertiary-dim": "#674f24",
                        "secondary-container": "#7cf8dd",
                        "on-tertiary-fixed-variant": "#6f562a",
                        "on-secondary": "#e3fff6",
                        "on-tertiary-container": "#644c21",
                        "on-secondary-fixed": "#00483d",
                        "surface-dim": "#d3dcdb",
                        "primary": "#0960ac",
                        "surface-container-highest": "#dbe4e3",
                        "background": "#f7faf9",
                        "outline": "#737c7c",
                        "surface-bright": "#f7faf9",
                        "surface": "#f7faf9",
                        "error-dim": "#67040d",
                        "surface-tint": "#0960ac",
                        "on-error": "#fff7f6",
                        "error-container": "#fa746f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#fff8f2",
                        "secondary-fixed-dim": "#6ce9cf",
                        "surface-variant": "#dbe4e3",
                        "on-primary-fixed": "#000613",
                        "secondary-dim": "#005e50",
                        "on-tertiary-fixed": "#503a11",
                        "on-surface-variant": "#586160",
                        "on-primary-container": "#00284e",
                        "secondary-fixed": "#7cf8dd",
                        "surface-container-low": "#f0f5f4",
                        "inverse-on-surface": "#9a9e9d",
                        "error": "#a83836",
                        "secondary": "#006c5c",
                        "inverse-primary": "#6aa8f9",
                        "on-background": "#2c3434"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .breathe-ring {
            background: conic-gradient(from 0deg, #7cf8dd, #0960ac, #7cf8dd);
            mask: radial-gradient(farthest-side, transparent calc(100% - 12px), black calc(100% - 11px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 12px), black calc(100% - 11px));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary-container">
<!-- Screen Content: Focused Transactional (No Global Nav) -->
<main class="min-h-screen flex flex-col relative overflow-hidden bg-gradient-to-b from-background to-surface-container">
<!-- Background Ambient "Breathe" Decor -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary-fixed/10 rounded-full blur-[80px]"></div>
<!-- Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6 py-12 z-10">
<!-- Icon & Header Container -->
<div class="w-full max-w-md text-center mb-12">
<div class="inline-flex items-center justify-center w-24 h-24 mb-8 relative">
<div class="absolute inset-0 breathe-ring opacity-30 animate-[spin_8s_linear_infinite]"></div>
<div class="bg-surface-container-lowest shadow-sm rounded-full p-6 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="medical_services">medical_services</span>
</div>
</div>
<h1 class="font-headline font-bold text-4xl md:text-5xl text-on-surface tracking-tight leading-tight mb-4">
                    Time to take your medicine
                </h1>
<p class="text-on-surface-variant text-lg font-medium opacity-80">
                    A gentle reminder for your daily wellness
                </p>
</div>
<!-- Medication Details Card (Asymmetric Bento Style) -->
<div class="w-full max-w-lg mb-12">
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-sm flex flex-col md:flex-row items-center md:items-start gap-6 border border-white/40">
<div class="flex-shrink-0 w-20 h-20 bg-primary-container/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="pill">pill</span>
</div>
<div class="flex-1 text-center md:text-left">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">BP Tablet</h2>
<div class="inline-flex items-center px-4 py-1.5 rounded-full bg-surface-container-high text-primary font-bold text-sm tracking-wide">
<span class="material-symbols-outlined text-sm mr-2" data-icon="schedule">schedule</span>
                            8:00 AM
                        </div>
<p class="mt-4 text-on-surface-variant font-medium leading-relaxed">
                            Take one tablet with water. Avoid caffeine for 30 minutes.
                        </p>
</div>
</div>
</div>
<!-- Urgent Action Buttons -->
<div class="w-full max-w-lg flex flex-col gap-4">
<!-- Mark Taken (Primary Action) -->
<button class="group w-full py-6 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl font-headline font-extrabold text-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Mark Taken
                </button>
<!-- Snooze Container (Secondary Actions) -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<button class="w-full py-5 bg-tertiary-container text-on-tertiary-container rounded-xl font-headline font-bold text-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="snooze">snooze</span>
                        Snooze (10 min)
                    </button>
<button class="w-full py-5 bg-surface-container-high text-on-surface-variant rounded-xl font-headline font-bold text-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="close">close</span>
                        Dismiss
                    </button>
</div>
</div>
</div>
<!-- Footer Visual (Soft Tonal Shift) -->
<div class="w-full max-w-md mx-auto px-6 pb-12 text-center">
<div class="h-[2px] w-12 bg-outline-variant/20 mx-auto mb-6"></div>
<p class="text-sm font-label text-on-surface-variant/60 tracking-widest uppercase">
                Gentle Reminder Support
            </p>
</div>
</main>
<!-- Visual Safety Overlay (Soft Gradient) -->
<div class="fixed inset-0 pointer-events-none border-[1.5rem] border-background/50 z-50"></div>
</body></html>
