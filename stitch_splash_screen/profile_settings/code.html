<div class="flex items-center gap-4">

<main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">

<section class="space-y-6">
<header class="flex flex-col gap-1">
<h2 class="headline-font text-3xl font-extrabold tracking-tight text-on-surface">Your Sanctuary Profile</h2>
<p class="text-on-surface-variant font-medium">Keep your vital information up to date for better care.</p>
</header>
<div class="space-y-4">
<!-- Name Field -->
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 tracking-wide uppercase font-label">Full Name</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-5 py-4 text-lg font-medium text-on-surface focus:ring-2 focus:ring-primary-container transition-all" type="text" value="Elizabeth Harrington"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Age Field -->
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 tracking-wide uppercase font-label">Age</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-5 py-4 text-lg font-medium text-on-surface focus:ring-2 focus:ring-primary-container transition-all" type="number" value="72"/>
</div>
<!-- Emergency Contact -->
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 tracking-wide uppercase font-label">Emergency Contact</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-5 py-4 text-lg font-medium text-on-surface focus:ring-2 focus:ring-primary-container transition-all" type="text" value="+1 (555) 012-3456"/>
</div>
</div>
<!-- Medical Condition Field -->
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-1.5 ml-1 tracking-wide uppercase font-label">Medical Conditions</label>
<textarea class="w-full bg-surface-container-high border-none rounded-sm px-5 py-4 text-lg font-medium text-on-surface focus:ring-2 focus:ring-primary-container transition-all resize-none" rows="3">Type 2 Diabetes, Mild Hypertension</textarea>
</div>
</div>
</section>
<!-- Preferences & Accessibility Bento -->
<section class="space-y-6">
<h2 class="headline-font text-2xl font-bold tracking-tight text-on-surface">Preferences &amp; Accessibility</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Text Size Control -->
<div class="p-6 bg-surface-container-lowest rounded-lg shadow-[0_12px_32px_rgba(44,52,52,0.06)] flex flex-col justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="format_size">format_size</span>
</div>
<h3 class="font-bold text-lg">Text Size</h3>
</div>
<div class="flex items-center justify-between bg-surface-container rounded-full p-1">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high text-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-bold text-xl px-4">Standard</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container shadow-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>

<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-on-tertiary-container">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</div>

</div>
<div class="flex items-center justify-between p-2 bg-surface-container rounded-full">
<button class="flex-1 py-2 px-4 rounded-full bg-white text-primary font-bold shadow-sm transition-all text-sm">Light</button>
<button class="flex-1 py-2 px-4 rounded-full text-on-surface-variant font-medium hover:bg-surface-container-high transition-all text-sm">Dark</button>
</div>
</div>
</div>
</section>

<span class="material-symbols-outlined text-error" data-icon="logout">logout</span>
<span class="font-semibold text-lg text-error">Logout</span>
