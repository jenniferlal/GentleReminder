            margin: 0;
            padding: 0;
            overflow: hidden;

<body class="font-body text-on-surface">
<!-- Splash Screen Wrapper -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center bg-surface overflow-hidden">
<!-- Ambient Background Elements (Visual Sanctuary Design) -->
<div class="absolute top-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[50vw] h-[50vw] rounded-full bg-primary-container/10 blur-[100px]"></div>
<!-- Central Identity Cluster -->
<div class="relative z-10 flex flex-col items-center gap-12">
<!-- Logo Container -->
<div class="relative group">
<!-- Inner Glow -->
<div class="absolute inset-0 bg-secondary-fixed rounded-full blur-2xl opacity-30 animate-pulse"></div>
<!-- Main Pill/Heart Icon Card -->
<div class="relative w-32 h-32 md:w-40 md:h-40 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_12px_32px_rgba(44,52,52,0.06)] overflow-hidden">
<!-- Icon Surface with Gradient -->
<div class="w-20 h-20 md:w-24 md:h-24 logo-gradient rounded-full flex items-center justify-center soft-glow">
<span class="material-symbols-outlined text-white text-5xl md:text-6xl" style="font-variation-settings: 'FILL' 1;">
                            favorite
                        </span>
</div>
</div>
</div>
<!-- App Typography -->
<div class="flex flex-col items-center text-center px-6">
<h1 class="font-headline font-extrabold text-5xl md:text-6xl text-primary tracking-tight">
                    Gentle Reminder
                </h1>
<!-- Tagline (Asymmetric Editorial Style) -->
<div class="mt-4 flex items-center gap-3">
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
<p class="font-body text-on-surface-variant text-lg md:text-xl tracking-wide font-medium">
                        Your digital sanctuary
                    </p>
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
</div>
</div>
</div>
<!-- Footer / Accessibility Prompt (Subtle) -->
<div class="absolute bottom-12 flex flex-col items-center gap-4">
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary-container opacity-50"></div>
<div class="w-2 h-2 rounded-full bg-primary-container opacity-30"></div>
</div>
<p class="text-sm font-label text-outline uppercase tracking-[0.2em] font-semibold">
                Loading Peace of Mind
            </p>
</div>
</main>
<!-- Content Hidden Logic (Optional context for LLM but following suppression rules) -->
<!-- Note: TopAppBar and BottomNavBar are suppressed as per "The Destination Rule" 
         because a Splash Screen is a Linear/Transactional focused journey. -->
